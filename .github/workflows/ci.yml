name: OwnAI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Frontend Checks
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # Backend Checks
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports || true

  # Docker Build Test
  docker:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build Frontend Image
        run: docker build -f infra/docker/Dockerfile.frontend -t ownai-frontend frontend/

      - name: Build Backend Image
        run: docker build -f infra/docker/Dockerfile.backend -t ownai-backend backend/
